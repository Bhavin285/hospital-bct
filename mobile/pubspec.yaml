name: bct_flutter_app
description: "Bezuban Charitable Trust - Animal Hospital Management App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Authentication - AWS Cognito
  amazon_cognito_identity_dart_2: ^3.8.1

  # Secure Storage (for tokens)
  flutter_secure_storage: ^9.2.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Date/Time
  intl: ^0.19.0

  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.13.0

  # File/Sharing
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  open_file: ^3.3.2

  # Permissions
  permission_handler: ^11.3.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/pdf_logo.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/pdf_logo.jpg"
