version = 0.1

[default.deploy.parameters]
stack_name = "bct-backend"
resolve_s3 = true
s3_prefix = "bct-backend"
region = "ap-south-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "Environment=\"dev\""
image_repositories = []

[default.global.parameters]
region = "ap-south-1"

[prod.deploy.parameters]
stack_name = "bct-backend-prod"
resolve_s3 = true
s3_prefix = "bct-backend-prod"
region = "ap-south-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "Environment=\"prod\""
image_repositories = []

[prod.global.parameters]
region = "ap-south-1"
